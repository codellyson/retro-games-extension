<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Breakout New Tab — Options</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
        padding: 24px;
        min-width: 360px;
        color: #222;
        background: #fafaf7;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 4px;
      }
      p.sub {
        margin: 0 0 20px;
        font-size: 12px;
        color: #888;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid #eee;
      }
      .row:last-child {
        border-bottom: 0;
      }
      .label {
        font-size: 13px;
      }
      .themes {
        display: flex;
        gap: 6px;
      }
      .theme {
        padding: 6px 12px;
        border: 1px solid #ddd;
        border-radius: 999px;
        background: white;
        font-size: 12px;
        cursor: pointer;
      }
      .theme.active {
        background: #222;
        color: white;
        border-color: #222;
      }
      input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }
      .foot {
        margin-top: 16px;
        font-size: 11px;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <h1>Breakout New Tab</h1>
    <p class="sub">Your preferences sync across signed-in Chrome devices.</p>

    <div class="row">
      <span class="label">Theme</span>
      <div class="themes" id="themes">
        <button class="theme" data-theme="glassy">Glassy</button>
        <button class="theme" data-theme="neon">Neon</button>
        <button class="theme" data-theme="paper">Paper</button>
      </div>
    </div>

    <div class="row">
      <span class="label">Difficulty</span>
      <div class="themes" id="difficulty">
        <button class="theme" data-difficulty="easy">Easy</button>
        <button class="theme" data-difficulty="normal">Normal</button>
        <button class="theme" data-difficulty="hard">Hard</button>
      </div>
    </div>

    <div class="row">
      <span class="label">Sound</span>
      <input type="checkbox" id="sound" checked />
    </div>

    <div class="row">
      <span class="label">Show bookmarks bar</span>
      <input type="checkbox" id="bookmarks" checked />
    </div>

    <div class="row">
      <span class="label">High score</span>
      <span id="best" style="font-family: 'SF Mono', monospace">0000</span>
    </div>

    <div class="row">
      <span class="label">Reset high score</span>
      <button id="reset" class="theme">Reset</button>
    </div>

    <p class="foot">Alt+B to toggle the game on the new-tab page.</p>

    <script src="options.js"></script>
  </body>
</html>
